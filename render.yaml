services:
  # Web Service running FastAPI application
  - type: web
    name: doe-pdf-aggregator
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doe-scraper-db
          property: connectionString
      - key: SYNC_INTERVAL_HOURS
        value: 24
      - key: HTTP_TIMEOUT_SECONDS
        value: 30
      - key: MAX_PDF_SIZE_BYTES
        value: 10485760 # 10MB
      - key: PORT
        value: 8000

  # Option: Render Cron Job to trigger sync via endpoint
  # Note: A free-tier web service can spin down when idle.
  # Triggering /sync via Cron ensures the service wakes up and runs sync every 24 hours.
  - type: cron
    name: doe-pdf-aggregator-cron
    env: docker
    dockerfilePath: Dockerfile
    schedule: "0 0 * * *" # Runs daily at midnight UTC
    buildCommand: "pip install httpx"
    # Calls the main web service URL to trigger the background sync task
    startCommand: "curl -X POST https://doe-pdf-aggregator.onrender.com/sync"
    plan: free

databases:
  - name: doe-scraper-db
    plan: free
